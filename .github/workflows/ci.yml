name: CI

on:
  pull_request:
    branches: [main]
  # El flujo real es push directo a main (con bypass de branch protection), no PRs.
  # Sin este trigger, `astro check` + build nunca corrian en CI: por eso 7 builds
  # rotos (M15-M21) pasaron inadvertidos. Ahora cada push a main valida el codigo.
  push:
    branches: [main]

jobs:
  check:
    name: Type check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Astro type check
        run: npx astro check

      - name: Build
        run: npm run build
        env:
          META_PIXEL_ID: ${{ secrets.META_PIXEL_ID }}
          META_CAPI_TOKEN: placeholder_for_ci
          HUBSPOT_TOKEN: placeholder_for_ci
          CLOUDFLARE_API_TOKEN: placeholder_for_ci
